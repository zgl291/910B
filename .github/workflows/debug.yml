name: Debug Build

on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug Build Steps
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Show environment
        run: |
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Repo: ${{ github.repository }}"
          echo "Disk space:"
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - Test simple pull
        run: |
          echo "=== Test 1: Pull ubuntu:22.04 ==="
          docker pull ubuntu:22.04
          echo "=== Test 1 PASSED ==="

          echo "=== Test 2: Pull ascendai/pytorch (ARM64) ==="
          timeout 120 docker pull --platform linux/arm64 ascendai/pytorch:2.1.0-cann8.0.RC2-py3.9 2>&1 || {
            echo "=== Test 2 FAILED or TIMED OUT ==="
            echo "ascendai/pytorch image may not be accessible from GitHub Actions"
          }

      - name: Debug - Simple test build (CPU)
        run: |
          echo "=== Testing minimal Dockerfile ==="
          cat > /tmp/test.Dockerfile << 'DEOF'
          FROM ubuntu:22.04
          RUN apt-get update && apt-get install -y python3 python3-pip && rm -rf /var/lib/apt/lists/*
          DEOF

          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            -t ghcr.io/${{ github.repository }}:test-cpu \
            -f /tmp/test.Dockerfile \
            --push \
            . 2>&1 | tail -20

          echo "=== Test build result: $? ==="

      - name: Debug - Show docker buildx version
        run: |
          docker buildx version
          docker buildx ls
