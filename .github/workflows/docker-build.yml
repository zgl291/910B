name: Build Ascend Remote Sensing Container

on:
  push:
    branches: [main, master, build-image]
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Image tag (default: latest)'
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: ascendai/pytorch:2.1.0-cann8.0.RC2-py3.9

jobs:
  # ================================================================
  # Build ARM64 production image for Ascend 910B
  # ================================================================
  build-arm64:
    name: Build ARM64 Production Image
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.docker_tag || 'latest' }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.event.inputs.docker_tag || 'latest' }}
          build-args: |
            PYTORCH_IMAGE=${{ env.BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # Build CPU-only test image (x86, fast)
  # ================================================================
  build-cpu-test:
    name: Build CPU Test Image (x86)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.local-test
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-test-${{ github.event.inputs.docker_tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
