name: Build Ascend Remote Sensing Container

on:
  push:
    branches: [main, master, build-image]
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Image tag'
        type: string
        default: 'latest'

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-cpu-test:
    name: Build CPU Test Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build with docker CLI
        run: |
          set -euo pipefail

          echo "=== Step 1: Login to GHCR ==="
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

          echo "=== Step 2: Build image ==="
          docker build \
            -f Dockerfile.local-test \
            -t "${{ env.IMAGE }}:cpu-test-${{ github.event.inputs.docker_tag || 'latest' }}" \
            .

          echo "=== Step 3: Push image ==="
          docker push "${{ env.IMAGE }}:cpu-test-${{ github.event.inputs.docker_tag || 'latest' }}"

          echo "=== DONE: CPU test image pushed ==="

  build-arm64:
    name: Build ARM64 Production Image
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build with docker CLI (QEMU)
        run: |
          set -euo pipefail

          echo "=== Step 1: Login to GHCR ==="
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

          echo "=== Step 2: Build ARM64 image ==="
          docker buildx build \
            --platform linux/arm64 \
            --build-arg PYTORCH_IMAGE=ascendai/pytorch:ubuntu-python3.8-cann8.0.rc1.beta1-pytorch2.1.0 \
            -f Dockerfile.production \
            -t "${{ env.IMAGE }}:${{ github.event.inputs.docker_tag || 'latest' }}" \
            --push \
            .

          echo "=== DONE: ARM64 production image pushed ==="
