name: Build Ascend Remote Sensing Container

# Triggers: push to main/master, or manual trigger
on:
  push:
    branches: [main, master, build-image]
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Image tag (default: latest)'
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: ascendai/pytorch:2.1.0-cann8.0.RC2-py3.9
  IMAGE_TAG: ${{ github.event.inputs.docker_tag || 'latest' }}

jobs:
  # ================================================================
  # Job 1: Build CPU-only test image (x86, fast, no QEMU needed)
  # This validates all pip packages install correctly
  # ================================================================
  build-cpu-test:
    name: Build CPU Test Image (x86)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-cpu
          key: ${{ runner.os }}-cpu-buildx-${{ hashFiles('requirements/*.txt', 'Dockerfile.local-test') }}
          restore-keys: |
            ${{ runner.os }}-cpu-buildx-

      - name: Build CPU test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.local-test
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-test-${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache-cpu
          cache-to: type=local,dest=/tmp/.buildx-cache-cpu-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-cpu
          mv /tmp/.buildx-cache-cpu-new /tmp/.buildx-cache-cpu

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cpu-test-${{ env.IMAGE_TAG }}
          echo "CPU test image pushed successfully"

  # ================================================================
  # Job 2: Build ARM64 production image (QEMU emulation on x86)
  # This is the real production image for Ascend 910B
  # ================================================================
  build-arm64:
    name: Build ARM64 Production Image
    runs-on: ubuntu-24.04
    timeout-minutes: 360  # 6 hours max

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space (critical for large image builds)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-arm
          key: ${{ runner.os }}-arm-buildx-${{ hashFiles('requirements/*.txt', 'Dockerfile.production') }}
          restore-keys: |
            ${{ runner.os }}-arm-buildx-

      - name: Build ARM64 image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ env.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache-arm
          cache-to: type=local,dest=/tmp/.buildx-cache-arm-new,mode=max
          build-args: |
            PYTORCH_IMAGE=${{ env.BASE_IMAGE }}
          # Allow higher memory usage for QEMU
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-arm
          mv /tmp/.buildx-cache-arm-new /tmp/.buildx-cache-arm

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          IMAGE_SIZE=$(docker image inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --format='{{.Size}}' 2>/dev/null | awk '{printf "%.1f GB", $1/1024/1024/1024}')
          echo "Production image size: ${IMAGE_SIZE}"

      - name: Save as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ascend-rs-arm64-image
          path: |
            *.tar.gz
          retention-days: 5
          if-no-files-found: ignore

      - name: Build summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Base**: \`${{ env.BASE_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull on your 910B server" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker login ghcr.io -u ${{ github.actor }} -p \$GH_PAT" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
