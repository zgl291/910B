name: Build Ascend Remote Sensing Container

on:
  push:
    branches: [main, master, build-image]
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Image tag'
        type: string
        default: 'latest'

env:
  IMAGE: ghcr.io/${{ github.repository }}
  TAG: ${{ github.event.inputs.docker_tag || 'latest' }}

permissions:
  contents: read
  packages: write

jobs:
  # ================================================================
  # Step 1: Sanity check
  # ================================================================
  sanity-check:
    name: Sanity Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Test docker build
        run: |
          echo "FROM alpine:latest" > /tmp/test.Dockerfile
          echo "RUN echo hello" >> /tmp/test.Dockerfile
          docker build -f /tmp/test.Dockerfile -t test-build .
          echo "Minimal build succeeded"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push test image
        run: |
          docker tag test-build ${{ env.IMAGE }}:sanity
          docker push ${{ env.IMAGE }}:sanity

  # ================================================================
  # Step 2: Build CPU test image
  # ================================================================
  build-cpu:
    name: Build CPU Test Image
    needs: sanity-check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.local-test
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:cpu-test-${{ env.TAG }}
          provenance: false

  # ================================================================
  # Step 3: Build ARM64 production image
  # ================================================================
  build-arm64:
    name: Build ARM64 Production Image
    needs: build-cpu
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:arm64-${{ env.TAG }}
          build-args: |
            PYTORCH_IMAGE=ascendai/pytorch:ubuntu-python3.8-cann8.0.rc1.beta1-pytorch2.1.0
          provenance: false
